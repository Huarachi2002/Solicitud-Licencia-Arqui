<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Estudiante | Solicitud de Licencias UAGRM</title>
  <meta name="description" content="Formulario de registro de estudiantes para el sistema de Solicitud de Licencias UAGRM." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    /* Input focus glow */
    .field-input {
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .field-input:focus {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.4);
    }

    /* Button animations */
    .btn-primary {
      transition: all 0.2s ease;
    }
    .btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
    .btn-primary:active { transform: scale(0.98); }

    /* Card animation */
    .card-form {
      animation: slideUp 0.35s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Toast */
    #toast {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #toast.hidden {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
    }

    /* Password toggle icon */
    .eye-btn { cursor: pointer; transition: opacity 0.15s; }
    .eye-btn:hover { opacity: 0.7; }

    /* Password strength bar */
    #strength-bar {
      transition: width 0.3s ease, background-color 0.3s ease;
    }
  </style>
</head>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="flex-1 flex flex-col min-h-screen">

    <!-- Header bar -->
    <div class="bg-[#1565a8] px-8 py-5 flex items-center justify-between">
      <h1 class="text-white text-2xl font-extrabold uppercase tracking-widest">
        Solicitud de Licencias UAGRM
      </h1>
      <span class="text-white/60 text-xs font-semibold uppercase tracking-wider">
        Facultad de Ingeniería · FCCT
      </span>
    </div>

    <!-- Content area -->
    <div class="flex-1 bg-[#1e7fc0] p-8 flex items-start justify-center">

      <!-- Toast notification -->
      <div id="toast"
           class="hidden fixed top-4 right-4 z-50 bg-emerald-500 text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-lg">
        ✓ <span id="toast-msg"></span>
      </div>

      <!-- Form card -->
      <div class="card-form w-full max-w-xl">

        <!-- Card title -->
        <p class="text-white/70 text-xs uppercase tracking-widest mb-1">Nuevo registro</p>
        <h2 class="text-white text-2xl font-extrabold uppercase tracking-wide mb-6">
          REGISTRARME
        </h2>

        <!-- Form -->
        <form id="form-estudiante" onsubmit="submitEstudiante(event)" novalidate
              class="bg-white/10 backdrop-blur-sm rounded-2xl border border-white/20 shadow-lg p-8 space-y-5">

          <!-- Fila 1: Nombre completo -->
          <div>
            <label for="input-name" class="block text-white/80 text-xs uppercase tracking-widest mb-2">
              Nombre Completo
            </label>
            <input id="input-name"
                   type="text"
                   required
                   placeholder="Ej: Juan Pérez López"
                   class="field-input w-full bg-white text-slate-800 rounded-xl px-5 py-3 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder-slate-400" />
          </div>

          <!-- Fila 2: Nro. de Registro + C.I. -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="input-num-register" class="block text-white/80 text-xs uppercase tracking-widest mb-2">
                Nro. de Registro
              </label>
              <input id="input-num-register"
                     type="text"
                     required
                     placeholder="Ej: 216-00001"
                     class="field-input w-full bg-white text-slate-800 rounded-xl px-5 py-3 text-sm
                            focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder-slate-400" />
            </div>
            <div>
              <label for="input-ci" class="block text-white/80 text-xs uppercase tracking-widest mb-2">
                C.I.
              </label>
              <input id="input-ci"
                     type="text"
                     required
                     placeholder="Ej: 1234567 SC"
                     class="field-input w-full bg-white text-slate-800 rounded-xl px-5 py-3 text-sm
                            focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder-slate-400" />
            </div>
          </div>

          <!-- Fila 3: Correo -->
          <div>
            <label for="input-mail" class="block text-white/80 text-xs uppercase tracking-widest mb-2">
              Correo Electrónico
            </label>
            <input id="input-mail"
                   type="email"
                   required
                   placeholder="Ej: juan.perez@ficct.uagrm.edu.bo"
                   class="field-input w-full bg-white text-slate-800 rounded-xl px-5 py-3 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder-slate-400" />
          </div>

          <!-- Fila 4: Celular -->
          <div>
            <label for="input-cellphone" class="block text-white/80 text-xs uppercase tracking-widest mb-2">
              Celular
            </label>
            <input id="input-cellphone"
                   type="tel"
                   required
                   placeholder="Ej: 70000000"
                   class="field-input w-full bg-white text-slate-800 rounded-xl px-5 py-3 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder-slate-400" />
          </div>

          <!-- Fila 5: Contraseña -->
          <div>
            <label for="input-password" class="block text-white/80 text-xs uppercase tracking-widest mb-2">
              Contraseña
            </label>
            <div class="relative">
              <input id="input-password"
                     type="password"
                     required
                     placeholder="Mínimo 6 caracteres"
                     oninput="checkPasswordStrength(this.value)"
                     class="field-input w-full bg-white text-slate-800 rounded-xl px-5 py-3 pr-12 text-sm
                            focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder-slate-400" />
              <button type="button"
                      class="eye-btn absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"
                      onclick="togglePassword('input-password', this)"
                      tabindex="-1">
                <!-- Eye icon (visible) -->
                <svg id="icon-eye-password" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7
                           -1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <!-- Strength bar -->
            <div class="mt-2 h-1.5 bg-white/20 rounded-full overflow-hidden">
              <div id="strength-bar" class="h-full w-0 rounded-full bg-red-400"></div>
            </div>
            <p id="strength-label" class="text-white/50 text-xs mt-1"></p>
          </div>

          <!-- Fila 6: Confirmar contraseña -->
          <div>
            <label for="input-confirm-password" class="block text-white/80 text-xs uppercase tracking-widest mb-2">
              Confirmar Contraseña
            </label>
            <div class="relative">
              <input id="input-confirm-password"
                     type="password"
                     required
                     placeholder="Repite tu contraseña"
                     class="field-input w-full bg-white text-slate-800 rounded-xl px-5 py-3 pr-12 text-sm
                            focus:outline-none focus:ring-2 focus:ring-blue-300 placeholder-slate-400" />
              <button type="button"
                      class="eye-btn absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"
                      onclick="togglePassword('input-confirm-password', this)"
                      tabindex="-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7
                           -1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <p id="match-label" class="text-xs mt-1 h-4"></p>
          </div>

          <!-- Botones -->
          <div class="flex justify-end gap-3 pt-2">
            <button type="reset"
                    id="btn-cancelar"
                    onclick="resetForm()"
                    class="btn-primary bg-white/20 hover:bg-white/30 text-white font-bold text-sm
                           uppercase tracking-wider px-7 py-2.5 rounded-xl border border-white/30">
              CANCELAR
            </button>
            <button type="submit"
                    id="btn-registrar"
                    class="btn-primary bg-[#0d3b6e] hover:bg-[#0a2d57] text-white font-bold text-sm
                           uppercase tracking-wider px-7 py-2.5 rounded-xl shadow-md">
              REGISTRARSE
            </button>
          </div>

        </form><!-- /form -->

        <!-- Login redirect -->
        <p class="text-center text-white/60 text-xs mt-4">
          ¿Ya tienes cuenta?
          <a href="#" class="text-white font-semibold hover:underline">Inicia sesión</a>
        </p>

      </div><!-- /card -->
    </div><!-- /content area -->
  </main><!-- /main -->

  <!-- ========== MODAL ÉXITO ========== -->
  <div id="modal-success" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative z-10 bg-[#1565a8] rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-8 text-center
                animate-[slideUp_0.25s_ease]">
      <div class="w-16 h-16 bg-emerald-400/20 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-9 h-9 text-emerald-400" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-white font-extrabold text-xl mb-2">Registro Correcto</h2>
      <p class="text-white/70 text-sm mb-1">
        Tu cuenta de estudiante ha sido creada correctamente.
      </p>
      <p class="text-white/50 text-xs mb-6">Redirigiendo al inicio...</p>
      <!-- Barra de progreso de redirección -->
      <div class="w-full bg-white/20 rounded-full h-1 mb-6 overflow-hidden">
        <div id="redirect-bar"
             class="h-full bg-emerald-400 rounded-full"
             style="width:0%; transition: width 2s linear;"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api/usuario/student';


    const UsuarioPresentacion = {
      async registerStudent({ name_full, mail, cellphone, num_register, password, confirmPassword }) {
        // Validaciones de negocio
        if (!name_full.trim())       throw new Error('El nombre completo es requerido.');
        if (!num_register.trim())    throw new Error('El nro. de registro es requerido.');
        if (!mail.trim())            throw new Error('El correo electrónico es requerido.');
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(mail))
                                     throw new Error('El correo electrónico no es válido.');
        if (!cellphone.trim())       throw new Error('El celular es requerido.');
        if (password.length < 6)     throw new Error('La contraseña debe tener al menos 6 caracteres.');
        if (password !== confirmPassword)
                                     throw new Error('Las contraseñas no coinciden.');

        const res = await fetch(API_BASE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name_full: name_full.trim(),
            mail: mail.trim().toLowerCase(),
            cellphone: cellphone.trim(),
            num_register: num_register.trim(),
            password
          })
        });
        if (!res.ok) throw new Error('Error al registrar el usuario');
        messagePop()
      }
    };

    function messagePop() {
        // Limpiar formulario
        document.getElementById('form-estudiante').reset();
        resetStrength();
        document.getElementById('match-label').textContent = '';

        // Mostrar modal
        const modal = document.getElementById('modal-success');
        modal.classList.remove('hidden');

        // Animar barra de progreso
        const bar = document.getElementById('redirect-bar');
        requestAnimationFrame(() => { bar.style.width = '100%'; });

        // Redirigir al home después de 2 segundos
        setTimeout(() => {
            window.location.href = '/home';
        }, 2000);
    }

    async function submitEstudiante(e) {
      e.preventDefault();

      const payload = {
        name_full:       document.getElementById('input-name').value,
        num_register:    document.getElementById('input-num-register').value,
        mail:            document.getElementById('input-mail').value,
        cellphone:       document.getElementById('input-cellphone').value,
        password:        document.getElementById('input-password').value,
        confirmPassword: document.getElementById('input-confirm-password').value,
      };

      const btn = document.getElementById('btn-registrar');
      btn.disabled = true;
      btn.textContent = 'Registrando...';

      try {
        await UsuarioPresentacion.registerStudent(payload);
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'REGISTRARSE';
      }
    }

    function resetForm() {
      document.getElementById('form-estudiante').reset();
      resetStrength();
      document.getElementById('match-label').textContent = '';
    }
    function closeSuccessModal() {
      document.getElementById('modal-success').classList.add('hidden');
    }

    /** Mostrar / ocultar contraseña */
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      // Cambiar ícono
      btn.innerHTML = isHidden
        ? `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
             <path stroke-linecap="round" stroke-linejoin="round"
                   d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7
                      a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                      M9.878 9.878l4.242 4.242M9.88 9.88L6.59 6.59m7.532 7.532l3.29 3.29
                      M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7
                      a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
           </svg>`
        : `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
             <path stroke-linecap="round" stroke-linejoin="round"
                   d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
             <path stroke-linecap="round" stroke-linejoin="round"
                   d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7
                      -1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
           </svg>`;
    }

    /** Indicador de fuerza de contraseña */
    function checkPasswordStrength(value) {
      const bar   = document.getElementById('strength-bar');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (value.length >= 6)  score++;
      if (value.length >= 10) score++;
      if (/[A-Z]/.test(value)) score++;
      if (/[0-9]/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;

      const levels = [
        { w: '0%',   color: 'bg-transparent', text: '' },
        { w: '20%',  color: 'bg-red-400',     text: 'Muy débil' },
        { w: '40%',  color: 'bg-orange-400',  text: 'Débil' },
        { w: '60%',  color: 'bg-yellow-400',  text: 'Regular' },
        { w: '80%',  color: 'bg-blue-400',    text: 'Fuerte' },
        { w: '100%', color: 'bg-emerald-400', text: 'Muy fuerte' },
      ];
      const lvl = levels[Math.min(score, 5)];
      bar.style.width = lvl.w;
      bar.className = `h-full rounded-full transition-all duration-300 ${lvl.color}`;
      label.textContent = lvl.text;
      label.className   = `text-xs mt-1 ${score >= 4 ? 'text-emerald-300' : 'text-white/50'}`;

      // Verificar match en tiempo real
      checkMatch();
    }

    function checkMatch() {
      const p1 = document.getElementById('input-password').value;
      const p2 = document.getElementById('input-confirm-password').value;
      const lbl = document.getElementById('match-label');
      if (!p2) { lbl.textContent = ''; return; }
      if (p1 === p2) {
        lbl.textContent = 'Las contraseñas coinciden';
        lbl.className   = 'text-xs mt-1 text-emerald-300';
      } else {
        lbl.textContent = 'Las contraseñas no coinciden';
        lbl.className   = 'text-xs mt-1 text-red-300';
      }
    }

    document.getElementById('input-confirm-password')
      .addEventListener('input', checkMatch);

    function resetStrength() {
      const bar = document.getElementById('strength-bar');
      bar.style.width = '0%';
      document.getElementById('strength-label').textContent = '';
    }

    /** Nav sidebar activo */
    function setActiveNav(el) {
      document.querySelectorAll('.nav-item').forEach(i => {
        i.classList.remove('bg-white/20', 'border-white');
        i.classList.add('border-transparent');
      });
      el.classList.add('bg-white/20', 'border-white');
      el.classList.remove('border-transparent');
    }

    /** Toast */
    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      const m = document.getElementById('toast-msg');
      m.textContent = msg;
      t.className = `fixed top-4 right-4 z-50 text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-lg ${
        type === 'error' ? 'bg-red-500' : 'bg-emerald-500'
      }`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.add('hidden'), 4000);
    }

    /** Cerrar modal con ESC */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSuccessModal();
    });
  </script>
</body>
