<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio | Solicitud de Licencias UAGRM</title>
  <meta name="description" content="Panel principal del sistema de Solicitud de Licencias UAGRM." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    .nav-item {
      transition: all 0.2s ease;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      background-color: rgba(255,255,255,0.15);
      border-left-color: white;
      transform: translateX(2px);
    }
    .nav-item.active {
      background-color: rgba(255,255,255,0.2);
      border-left-color: white;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

  <aside class="w-56 min-h-screen flex-shrink-0 flex flex-col"
         style="background: linear-gradient(180deg, #7ec8e3 0%, #5bb5d5 100%);">

    <div class="px-5 pt-6 pb-4 border-b border-white/20">
      <p class="font-bold text-slate-900 text-sm uppercase tracking-wide">Estudiante</p>
      <p class="text-slate-700 text-xs mt-0.5">Panel principal</p>
    </div>

    <nav class="flex-1 py-4 space-y-0.5 px-2">
      <div class="nav-item active rounded px-3 py-2.5 text-xs font-bold text-slate-900 uppercase tracking-wide"
           onclick="setActiveNav(this)">
        Inicio
      </div>
      <div class="nav-item rounded px-3 py-2.5 text-xs font-bold text-slate-900 uppercase tracking-wide"
           onclick="setActiveNav(this)">
        Solicitud de Licencias
      </div>
      <div class="nav-item rounded px-3 py-2.5 text-xs font-bold text-slate-900 uppercase tracking-wide"
           onclick="setActiveNav(this)">
        Mis Licencias
      </div>
      <div class="nav-item rounded px-3 py-2.5 text-xs font-bold text-slate-900 uppercase tracking-wide"
           onclick="setActiveNav(this)">
        Historial
      </div>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-h-screen">

    <div class="bg-[#1565a8] px-8 py-5 flex items-center justify-between">
      <h1 class="text-white text-2xl font-extrabold uppercase tracking-widest">
        Solicitud de Licencias UAGRM
      </h1>
      <span class="text-white/60 text-xs font-semibold uppercase tracking-wider">
        Facultad de Ingeniería · FCCT
      </span>
    </div>

    <div class="flex-1 bg-[#1e7fc0] p-8 flex items-center justify-center">
      <p class="text-white/40 text-sm uppercase tracking-widest">Próximamente</p>
    </div>

  </main>

  <script>
    function setActiveNav(el) {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      // Navigate based on text content
      const text = el.textContent.trim().toLowerCase();
      const routes = {
        'inicio': '/home',
        'gestionar roles': '/roles',
        'solicitud de licencias': '/licencias',
        'mis licencias': '/mis-licencias',
        'historial': '/historial',
        'gestionar grupos': '/grupos',
        'gestión de materias': '/materias',
        'configuración horarios': '/horarios',
        'gestionar personal docente': '/teacher',
        'asignación carga académica': '/carga-academica',
        'historial de notificaciones': '/notificaciones'
      };
      if (routes[text]) {
        window.location.href = routes[text];
      }

    }
  </script>
</body>
</html>
