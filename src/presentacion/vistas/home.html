<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio | Solicitud de Licencias UAGRM</title>
  <meta name="description" content="Panel principal del sistema de Solicitud de Licencias UAGRM." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .nav-item {
      transition: all 0.2s ease;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      background-color: rgba(255,255,255,0.15);
      border-left-color: white;
      transform: translateX(2px);
    }
    .nav-item.active {
      background-color: rgba(255,255,255,0.2);
      border-left-color: white;
    }
    .stat-card {
      animation: fadeSlideUp 0.4s ease both;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.12s; }
    .stat-card:nth-child(3) { animation-delay: 0.19s; }
    .stat-card:nth-child(4) { animation-delay: 0.26s; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

  <!-- ══ SIDEBAR ══ -->
  <aside class="w-56 min-h-screen flex-shrink-0 flex flex-col"
         style="background: linear-gradient(180deg, #7ec8e3 0%, #5bb5d5 100%);">

    <div class="px-5 pt-6 pb-4 border-b border-white/20">
      <p id="sidebar-username" class="font-bold text-slate-900 text-sm uppercase tracking-wide">—</p>
      <p id="sidebar-role"     class="text-slate-700 text-xs mt-0.5">—</p>
    </div>

    <nav id="sidebar-nav" class="flex-1 py-4 space-y-0.5 px-2">
      <!-- Generado por JS según rol -->
    </nav>

    <div class="px-3 pb-5">
      <button onclick="logout()"
              class="w-full text-left px-3 py-2 text-xs font-bold text-red-700 uppercase tracking-wide rounded hover:bg-red-100/30 transition-colors">
        ↩ Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="flex-1 flex flex-col min-h-screen">

    <div class="bg-[#1565a8] px-8 py-5 flex items-center justify-between">
      <h1 class="text-white text-2xl font-extrabold uppercase tracking-widest">
        Solicitud de Licencias UAGRM
      </h1>
      <span class="text-white/60 text-xs font-semibold uppercase tracking-wider">
        Facultad de Ingeniería · FCCT
      </span>
    </div>

    <div class="flex-1 bg-[#1e7fc0] p-8">

      <!-- Bienvenida -->
      <div class="mb-8">
        <p class="text-white/60 text-xs uppercase tracking-widest mb-1">Panel principal</p>
        <h2 id="welcome-title" class="text-white text-2xl font-extrabold">Bienvenido/a</h2>
        <p id="welcome-sub" class="text-white/60 text-sm mt-1"></p>
      </div>

      <!-- Tarjetas de acceso rápido  -->
      <div id="quick-cards" class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-3xl">
        <!-- Generado por JS según rol -->
      </div>

    </div>
  </main>

  <script>
    /* ════ MAPAS DE NAVEGACIÓN ════ */
    const ROUTES = {
      'inicio':                    '/home',
      'solicitud de licencias':    '/licencias',
      'gestionar roles':           '/roles',
      'gestionar grupos':          '/grupos',
      'gestión de materias':       '/materias',
      'configuración horarios':    '/horarios',
    };

    /* Menús por rol */
    const NAV_ADMIN = [
      { label: 'Inicio',                 route: '/home',     active: true  },
      { label: 'Solicitud de Licencias', route: '/licencias'              },
      { label: 'Gestionar Roles',        route: '/roles'                  },
      { label: 'Gestionar Grupos',       route: '/grupos'                 },
      { label: 'Gestión de Materias',    route: '/materias'               },
      { label: 'Configuración Horarios', route: '/horarios'               },
    ];
    const NAV_DOCENTE = [
      { label: 'Solicitud de Licencias', route: '/licencias', active: true },
    ];
    const NAV_ESTUDIANTE = [
      { label: 'Solicitud de Licencias', route: '/licencias', active: true },
    ];

    /* Tarjetas de acceso rápido */
    const CARDS_ADMIN = [
      { icon: '📋', label: 'Gestionar Licencias',    route: '/licencias', color: 'from-blue-500 to-blue-700'    },
      { icon: '🏷️', label: 'Gestionar Roles',         route: '/roles',     color: 'from-purple-500 to-purple-700' },
      { icon: '👥', label: 'Gestionar Grupos',        route: '/grupos',    color: 'from-emerald-500 to-emerald-700' },
      { icon: '📚', label: 'Gestión de Materias',     route: '/materias',  color: 'from-amber-500 to-amber-700'  },
      { icon: '🕐', label: 'Configuración Horarios',  route: '/horarios',  color: 'from-rose-500 to-rose-700'    },
    ];
    const CARDS_DOCENTE = [
      { icon: '📋', label: 'Mis Licencias Asignadas', route: '/licencias', color: 'from-blue-500 to-blue-700' },
    ];
    const CARDS_ESTUDIANTE = [
      { icon: '📋', label: 'Mis Solicitudes',         route: '/licencias', color: 'from-blue-500 to-blue-700' },
    ];

    /* ════ SESIÓN ════ */
    function initSession() {
      const raw = localStorage.getItem('session');
      if (!raw) { window.location.href = '/login'; return; }
      try {
        const session = JSON.parse(raw);
        const rol = (session.rol || '').toUpperCase();

        document.getElementById('sidebar-username').textContent = session.name_full || 'Usuario';
        document.getElementById('sidebar-role').textContent     = rol;
        document.getElementById('welcome-title').textContent    = `Bienvenido/a, ${session.name_full?.split(' ')[0]}`;
        document.getElementById('welcome-sub').textContent      = `Rol: ${rol} · Registro: ${session.num_register}`;

        // Redirigir si un docente/estudiante entra a /home directamente
        if (rol === 'DOCENTE' || rol === 'ESTUDIANTE') {
          window.location.href = '/licencias';
          return;
        }

        buildNav(rol === 'ADMINISTRADOR' ? NAV_ADMIN : []);
        buildCards(rol === 'ADMINISTRADOR' ? CARDS_ADMIN : []);

      } catch {
        localStorage.removeItem('session');
        window.location.href = '/login';
      }
    }

    function buildNav(items) {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = items.map(item => `
        <div class="nav-item ${item.active ? 'active' : ''} rounded px-3 py-2.5 text-xs font-bold text-slate-900 uppercase tracking-wide"
             onclick="navigate('${item.route}')">
          ${item.label}
        </div>
      `).join('');
    }

    function buildCards(items) {
      const container = document.getElementById('quick-cards');
      container.innerHTML = items.map((c, i) => `
        <div class="stat-card bg-gradient-to-br ${c.color} rounded-2xl p-5 cursor-pointer hover:scale-105 transition-transform shadow-lg"
             onclick="navigate('${c.route}')" style="animation-delay:${0.05 + i * 0.07}s">
          <div class="text-3xl mb-3">${c.icon}</div>
          <p class="text-white font-bold text-sm uppercase tracking-wide leading-tight">${c.label}</p>
        </div>
      `).join('');
    }

    function navigate(route) {
      window.location.href = route;
    }

    function logout() {
      localStorage.removeItem('session');
      window.location.href = '/login';
    }

    initSession();
  </script>
</body>
</html>
