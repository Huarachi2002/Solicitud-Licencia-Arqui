<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | Sistema Académico UAGRM</title>
  <meta name="description" content="Inicia sesión en el sistema de Solicitud de Licencias de la UAGRM." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    /* Fondo con gradiente animado */
    .bg-animated {
      background: linear-gradient(135deg, #1565a8 0%, #1e7fc0 40%, #5bb5d5 80%, #7ec8e3 100%);
      background-size: 300% 300%;
      animation: gradShift 8s ease infinite;
    }
    @keyframes gradShift {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    /* Tarjeta glassmorphism */
    .glass-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    /* Input */
    .login-input {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s ease;
      width: 100%;
    }
    .login-input::placeholder { color: rgba(255,255,255,0.45); }
    .login-input:focus {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
    }

    /* Botón principal */
    .btn-login {
      background: white;
      color: #1565a8;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 12px;
      padding: 13px;
      width: 100%;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }
    .btn-login:hover  { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Shake animation para error */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* Entrada de tarjeta */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    .card-in { animation: cardIn 0.5s ease forwards; }

    /* Loader spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(21,101,168,0.3);
      border-top-color: #1565a8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Icono label */
    .input-wrapper { position: relative; }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      pointer-events: none;
    }
    .login-input.has-icon { padding-left: 42px; }

    /* Toggle password */
    .toggle-pwd {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: color 0.15s;
    }
    .toggle-pwd:hover { color: rgba(255,255,255,0.8); }

    /* Mensaje de error */
    #error-msg {
      transition: all 0.25s ease;
    }
  </style>
</head>
<body class="bg-animated min-h-screen flex items-center justify-center p-4">

  <!-- Círculos decorativos de fondo -->
  <div class="fixed top-[-100px] right-[-100px] w-[400px] h-[400px] rounded-full opacity-10"
       style="background: radial-gradient(circle, white, transparent);"></div>
  <div class="fixed bottom-[-80px] left-[-80px] w-[300px] h-[300px] rounded-full opacity-10"
       style="background: radial-gradient(circle, white, transparent);"></div>

  <!-- Tarjeta principal -->
  <div class="glass-card card-in rounded-3xl w-full max-w-sm p-8">

    <!-- Logo / cabecera -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white/15 mb-4 shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422A12.083 12.083 0 0121 13c0 5.523-4.477 10-9 10S3 18.523 3 13c0-.768.09-1.51.25-2.22L12 14z"/>
        </svg>
      </div>
      <h1 class="text-white text-xl font-extrabold uppercase tracking-widest leading-tight">
        Sistema de Licencias
      </h1>
      <p class="text-white/50 text-xs mt-1 uppercase tracking-wider">UAGRM · FCCT</p>
    </div>

    <!-- Mensaje de error -->
    <div id="error-msg" class="hidden bg-red-500/20 border border-red-400/30 text-red-200 text-xs rounded-xl px-4 py-3 mb-5 text-center font-medium">
      <span id="error-text"></span>
    </div>

    <!-- Formulario -->
    <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4" novalidate>

      <!-- N° Registro -->
      <div>
        <label class="block text-white/60 text-[10px] uppercase tracking-widest font-semibold mb-1.5">
          N° de Registro
        </label>
        <div class="input-wrapper">
          <svg class="input-icon w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/>
          </svg>
          <input id="num_register"
                 type="text"
                 placeholder="Ej: 218099001"
                 required
                 autocomplete="username"
                 class="login-input has-icon" />
        </div>
      </div>

      <!-- Contraseña -->
      <div>
        <label class="block text-white/60 text-[10px] uppercase tracking-widest font-semibold mb-1.5">
          Contraseña
        </label>
        <div class="input-wrapper">
          <svg class="input-icon w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input id="password"
                 type="password"
                 placeholder="Tu contraseña"
                 required
                 autocomplete="current-password"
                 class="login-input has-icon" />
          <span class="toggle-pwd" onclick="togglePassword()" id="toggle-icon" title="Ver contraseña">
            <svg id="eye-show" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eye-hide" class="w-4 h-4 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Botón -->
      <button id="btn-login" type="submit" class="btn-login mt-2">
        Iniciar Sesión
      </button>

    </form>

    <!-- Registrar nuevo usuario si no tiene uno -->
    <div class="mt-6 text-center">
      <p class="text-white/60 text-xs">
        ¿No tienes cuenta de estudiante?
        <a href="/student" class="text-white font-semibold hover:underline ml-1">
          Regístrate aquí
        </a>
      </p>
    </div>

    <!-- Registrar nuevo usuario si no tiene uno -->
    <div class="mt-6 text-center">
      <p class="text-white/60 text-xs">
        ¿No tienes cuenta de docente?
        <a href="/teacher" class="text-white font-semibold hover:underline ml-1">
          Regístrate aquí
        </a>
      </p>
    </div>

    <!-- Footer -->
    <p class="text-white/30 text-[10px] text-center mt-6 uppercase tracking-widest">
      Solicitud de Licencias &copy; 2026
    </p>

  </div>

  <script>
    const API_LOGIN = '/api/usuario/login';

    /* ── Verificar sesión activa ── */
    (function checkSession() {
      const session = localStorage.getItem('session');
      if (session) {
        try {
          const { rol } = JSON.parse(session);
          redirectByRole(rol);
        } catch {
          localStorage.removeItem('session');
        }
      }
    })();

    /* ── Toggle password ── */
    function togglePassword() {
      const input   = document.getElementById('password');
      const eyeShow = document.getElementById('eye-show');
      const eyeHide = document.getElementById('eye-hide');
      if (input.type === 'password') {
        input.type = 'text';
        eyeShow.classList.add('hidden');
        eyeHide.classList.remove('hidden');
      } else {
        input.type = 'password';
        eyeShow.classList.remove('hidden');
        eyeHide.classList.add('hidden');
      }
    }

    /* ── Redirigir según rol ── */
    function redirectByRole(rol) {
      const r = (rol || '').toUpperCase();
      // Estudiante y Docente van a licencias; admin va a home
      if (r === 'ESTUDIANTE' || r === 'DOCENTE') {
        window.location.href = '/licencias';
      } else {
        window.location.href = '/home';
      }
    }

    /* ── Login ── */
    async function handleLogin(e) {
      e.preventDefault();
      hideError();

      const num_register = document.getElementById('num_register').value.trim();
      const password     = document.getElementById('password').value;

      if (!num_register || !password) {
        showError('Complete todos los campos.');
        return;
      }

      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch(API_LOGIN, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ num_register, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.message || 'Credenciales incorrectas');
        }

        /* Guardar sesión en localStorage */
        localStorage.setItem('session', JSON.stringify({
          id:           data.data.id,
          name_full:    data.data.name_full,
          num_register: data.data.num_register,
          mail:         data.data.mail,
          id_rol:       data.data.id_rol,
          rol:          data.data.rol
        }));

        redirectByRole(data.data.rol);

      } catch (err) {
        showError(err.message);
        shakeCard();
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Iniciar Sesión';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError() {
      document.getElementById('error-msg').classList.add('hidden');
    }
    function shakeCard() {
      const card = document.querySelector('.glass-card');
      card.classList.remove('shake');
      void card.offsetWidth; // reflow
      card.classList.add('shake');
    }

    /* Enter en campo de registro */
    document.getElementById('num_register').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>
</html>
